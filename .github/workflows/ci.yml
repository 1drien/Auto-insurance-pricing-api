name: Actuarial API CI/CD Pipeline

# Déclenchement automatique lors d'un push sur dev ou main
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code source depuis GitHub
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Installation de l'environnement Python
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      # 3. Installation des dépendances (Action 5.2.1 du TD)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 pytest  # Outils pour la qualité et les tests

      # 4. Vérification de la qualité du code (Action 5.2.3 du TD)
      - name: Lint with flake8
        run: |
          # Arrête le build s'il y a des erreurs de syntaxe Python ou des symboles indéfinis
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Avertissements de style (optionnel, ne bloque pas le build)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # 5. Exécution automatique des tests (Action 5.2.2 du TD)
      - name: Test with pytest
        run: |
          pytest

      # 6. Création de l'image Docker (Action 5.1 du TD)
      # Cette étape valide que le Dockerfile est correct et fonctionnel
      - name: Build Docker image
        run: |
          docker build -t actuarial-pricing-api:latest .